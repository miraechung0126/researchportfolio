<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v=20">
</head>
<body>
<header class="topbar">
  <div class="shell nav">
    <div class="brand">
      <img src="{{ '/assets/images/lotus.png' | relative_url }}" alt="Lotus icon" />
      <span>{{ site.title }}</span>
    </div>
    <nav class="menu" aria-label="Primary">
      <a class="{% if page.url == '/' %}active{% endif %}" href="{{ '/' | relative_url }}">Home</a>
      <a class="{% if page.url contains '/why-this-project/' %}active{% endif %}" href="{{ '/why-this-project/' | relative_url }}">Why This Project</a>
      <a class="{% if page.url contains '/journal/' %}active{% endif %}" href="{{ '/journal/' | relative_url }}">Journal</a>
      <a class="{% if page.url contains '/interviews/' %}active{% endif %}" href="{{ '/interviews/' | relative_url }}">Interviews</a>
      <a class="{% if page.url contains '/sources/' %}active{% endif %}" href="{{ '/sources/' | relative_url }}">Sources &amp; Notes</a>
      <a class="{% if page.url contains '/final-reflection/' %}active{% endif %}" href="{{ '/final-reflection/' | relative_url }}">Final Reflection</a>
    </nav>
  </div>
</header>
{{ content }}
<footer>{{ site.title }} • Temple Food, Health, and Public Health</footer>
</body>
</html>
