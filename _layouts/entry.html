---
layout: default
---
<section class="section">
  <div class="shell">
    <article class="entry">
      <h1 class="section-title">{{ page.title }}</h1>
      <div class="lotus-mark"><img src="{{ '/assets/images/lotus.png' | relative_url }}" alt="Lotus decorative icon"></div>
      <div class="meta">{{ page.category_label }}{% if page.date %} • {{ page.date | date: "%b %d, %Y" }}{% endif %}</div>
      {{ content }}
    </article>
  </div>
</section>
