backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main
  # If you later set up an OAuth helper, add base_url here.

site_url: https://YOUR_GITHUB_USERNAME.github.io/YOUR_REPO_NAME/
display_url: https://YOUR_GITHUB_USERNAME.github.io/YOUR_REPO_NAME/
logo_url: /assets/images/lotus.png
publish_mode: simple
media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: journal
    label: Journal
    folder: _journal
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {{ label: Title, name: title, widget: string }}
      - {{ label: Date, name: date, widget: datetime }}
      - {{ label: Body, name: body, widget: markdown }}

  - name: interviews
    label: Interviews
    folder: _interviews
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {{ label: Title, name: title, widget: string }}
      - {{ label: Date, name: date, widget: datetime }}
      - {{ label: Body, name: body, widget: markdown }}

  - name: sources
    label: Sources & Notes
    folder: _sources
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {{ label: Title, name: title, widget: string }}
      - {{ label: Date, name: date, widget: datetime }}
      - {{ label: Body, name: body, widget: markdown }}

  - name: reflections
    label: Final Reflection
    folder: _reflections
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {{ label: Title, name: title, widget: string }}
      - {{ label: Date, name: date, widget: datetime }}
      - {{ label: Body, name: body, widget: markdown }}
